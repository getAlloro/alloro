<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Full QA Checklist</title>
  <style>
    :root { color-scheme: light; --paper:#fff; --ink:#080808; --muted:#5f5f5f; --line:#d8d8d8; --soft:#f5f5f5; --pass:#0a6b2e; --fail:#9b1c1c; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--paper); color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; line-height:1.5; }
    .shell { width:min(980px,calc(100% - 32px)); margin:0 auto; padding:40px 0; }
    .hero { border:1px solid var(--ink); border-radius:8px; padding:28px; margin-bottom:18px; }
    .topline { display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .eyebrow { margin:0; color:var(--muted); font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
    .pill { display:inline-flex; align-items:center; min-height:32px; padding:0 14px; border:1px solid var(--ink); border-radius:999px; font-size:.76rem; font-weight:800; text-transform:uppercase; background:var(--ink); color:#fff; }
    .pill.passed { background:var(--pass); border-color:var(--pass); }
    .pill.failed { background:var(--fail); border-color:var(--fail); }
    h1 { margin:0 0 8px; font-size:clamp(1.7rem,4vw,2.4rem); line-height:1; }
    .progress { font-size:.85rem; color:var(--muted); font-weight:700; }
    .progwrap { height:8px; background:var(--soft); border:1px solid var(--line); border-radius:999px; overflow:hidden; margin-top:10px; }
    .progbar { height:100%; background:var(--pass); width:0%; transition:width .2s; }
    .bar { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:18px; }
    button { font:inherit; border:1px solid var(--ink); background:var(--paper); color:var(--ink); border-radius:8px; padding:8px 14px; font-weight:700; cursor:pointer; }
    button:hover { background:var(--soft); }
    .group { margin:22px 0 8px; display:flex; align-items:baseline; justify-content:space-between; gap:10px; border-bottom:2px solid var(--ink); padding-bottom:6px; }
    .group h2 { margin:0; font-size:1.05rem; }
    .group .gcount { font-size:.76rem; font-weight:800; color:var(--muted); }
    .item { border:1px solid var(--line); border-radius:8px; padding:14px 16px; margin:10px 0; }
    .item.pass { border-left:4px solid var(--pass); }
    .item.fail { border-left:4px solid var(--fail); }
    .item h3 { margin:0 0 4px; font-size:.98rem; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .item h3 input { transform:scale(1.2); }
    .route { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:.78rem; background:var(--soft); border:1px solid var(--line); border-radius:4px; padding:1px 6px; }
    .tag { font-size:.64rem; font-weight:800; text-transform:uppercase; border:1px solid var(--line); border-radius:999px; padding:1px 8px; color:var(--muted); }
    .st { font-weight:800; font-size:.7rem; text-transform:uppercase; margin-left:auto; }
    .st.pass { color:var(--pass); } .st.fail { color:var(--fail); } .st.pending { color:var(--muted); }
    .item dt { color:var(--muted); font-size:.68rem; font-weight:700; text-transform:uppercase; margin-top:8px; }
    .item dd { margin:2px 0 0; }
    .item ol { margin:4px 0 0 18px; padding:0; }
    .item ol li { margin:2px 0; }
    .notice { border:1px dashed var(--line); border-radius:8px; padding:14px; background:var(--soft); font-size:.9rem; }
    code { background:var(--soft); border:1px solid var(--line); border-radius:4px; padding:.05rem .3rem; }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div class="topline">
        <p class="eyebrow">Alloro · Full Page-by-Page QA · Layer 2</p>
        <span class="pill" id="pill">Not Run</span>
      </div>
      <h1 id="title">Full QA Checklist</h1>
      <p id="meta" class="eyebrow"></p>
      <div class="progress" id="prog"></div>
      <div class="progwrap"><div class="progbar" id="progbar"></div></div>
    </header>
    <div class="bar">
      <input type="file" id="file" accept="application/json" hidden>
      <button id="load">Load results file</button>
      <button id="download">Download updated results</button>
      <button id="reset">Reset all to pending</button>
    </div>
    <div id="notice" class="notice" hidden></div>
    <div id="list"></div>
  </main>
  <script>
    let data = null;
    const $ = id => document.getElementById(id);
    const esc = s => String(s).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;" }[c]));
    const rollup = d => {
      if (!d.items || !d.items.length) return "Not Run";
      if (d.items.some(i => i.status === "fail" && !i.waiver)) return "Failed";
      if (d.items.every(i => i.status === "pass" || (i.status === "fail" && i.waiver))) return "Passed";
      if (d.items.some(i => i.status !== "pending")) return "In Progress";
      return "Not Run";
    };
    function render() {
      if (!data) return;
      $("title").textContent = data.title || data.plan || "Full QA Checklist";
      $("meta").textContent = "Plan: " + (data.plan || "—") + " · generated " + (data.generatedAt || "—");
      const status = rollup(data); data.status = status;
      const pill = $("pill"); pill.textContent = status; pill.className = "pill " + status.toLowerCase().replace(/\s/g, "");
      const items = data.items || [];
      const done = items.filter(i => i.status === "pass").length;
      const failed = items.filter(i => i.status === "fail").length;
      $("prog").textContent = `${done} / ${items.length} passed` + (failed ? ` · ${failed} failed` : "");
      $("progbar").style.width = items.length ? (100 * done / items.length) + "%" : "0%";
      // group in first-seen order
      const groups = [];
      const byGroup = {};
      items.forEach((it, idx) => {
        const g = it.group || "Other";
        if (!byGroup[g]) { byGroup[g] = []; groups.push(g); }
        byGroup[g].push({ it, idx });
      });
      $("list").innerHTML = groups.map(g => {
        const rows = byGroup[g];
        const gdone = rows.filter(r => r.it.status === "pass").length;
        return `<div class="group"><h2>${esc(g)}</h2><span class="gcount">${gdone}/${rows.length}</span></div>` +
          rows.map(({ it, idx }) => `
            <div class="item ${it.status}">
              <h3><input type="checkbox" data-i="${idx}" ${it.status === "pass" ? "checked" : ""}>
                ${esc(it.title || it.id)}
                <span class="tag">${esc(it.surface || "")}</span>
                <span class="st ${it.status}">${esc(it.status || "pending")}</span></h3>
              <dl>
                ${it.route ? `<dt>Where</dt><dd><span class="route">${esc(it.route)}</span></dd>` : ""}
                ${it.precondition ? `<dt>Precondition</dt><dd>${esc(it.precondition)}</dd>` : ""}
                ${(it.steps && it.steps.length) ? `<dt>Steps</dt><ol>${it.steps.map(s => "<li>" + esc(s) + "</li>").join("")}</ol>` : ""}
                ${it.expected ? `<dt>Expected (pass = this is true)</dt><dd>${esc(it.expected)}</dd>` : ""}
                ${it.notes ? `<dt>Notes</dt><dd>${esc(it.notes)}</dd>` : ""}
              </dl>
            </div>`).join("");
      }).join("");
      $("list").querySelectorAll("input[type=checkbox]").forEach(cb =>
        cb.addEventListener("change", e => { data.items[+e.target.dataset.i].status = e.target.checked ? "pass" : "pending"; render(); }));
    }
    function showNotice(msg) { const n = $("notice"); n.hidden = false; n.innerHTML = msg; }
    $("load").addEventListener("click", () => $("file").click());
    $("file").addEventListener("change", e => {
      const f = e.target.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = () => { try { data = JSON.parse(r.result); $("notice").hidden = true; render(); } catch (err) { showNotice("Could not parse JSON: " + err.message); } };
      r.readAsText(f);
    });
    $("download").addEventListener("click", () => {
      if (!data) return;
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([JSON.stringify(data, null, 2)], { type: "application/json" }));
      a.download = "full-test-results.json"; a.click();
    });
    $("reset").addEventListener("click", () => {
      if (!data || !data.items) return;
      data.items.forEach(i => { i.status = "pending"; });
      render();
    });
    fetch("./full-test-results.json").then(r => r.json()).then(d => { data = d; render(); })
      .catch(() => showNotice("Couldn't auto-load <code>full-test-results.json</code> (browsers block this over <code>file://</code>). Click <b>Load results file</b> and pick it."));
  </script>
</body>
</html>
