<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Acceptance Tests</title><style>
body{margin:0;background:#fff;color:#080808;font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;line-height:1.5}.shell{width:min(960px,calc(100% - 32px));margin:0 auto;padding:40px 0}.hero,.item{border:1px solid #d8d8d8;border-radius:8px;padding:20px}.hero{border-color:#080808;margin-bottom:16px}.eyebrow{margin:0;color:#5f5f5f;font-size:.75rem;font-weight:800;text-transform:uppercase}.pill{display:inline-flex;border-radius:999px;background:#080808;color:#fff;padding:6px 12px;font-size:.75rem;font-weight:800;text-transform:uppercase}.top{display:flex;justify-content:space-between;gap:12px;align-items:center}h1{margin:12px 0 0;font-size:2rem;line-height:1}.item{margin:10px 0}.item.pass{border-left:4px solid #0a6b2e}.item.fail{border-left:4px solid #9b1c1c}dt{margin-top:8px;color:#5f5f5f;font-size:.72rem;font-weight:800;text-transform:uppercase}button{border:1px solid #080808;background:#fff;border-radius:8px;padding:8px 12px;font-weight:800}
</style></head><body><main class="shell"><header class="hero"><div class="top"><p class="eyebrow">Alloro Acceptance Tests</p><span id="pill" class="pill">Not Run</span></div><h1 id="title">Acceptance Tests</h1></header><button id="load">Load results file</button><input id="file" type="file" accept="application/json" hidden><div id="list"></div></main><script>
let data=null;const $=id=>document.getElementById(id);const esc=s=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));function render(){if(!data)return;$("title").textContent=data.plan;$("pill").textContent=data.status;$("list").innerHTML=(data.items||[]).map(i=>`<article class="item ${esc(i.status)}"><h3>${esc(i.id)} · ${esc(i.title)}</h3><dl><dt>Surface</dt><dd>${esc(i.surface)}</dd><dt>Expected</dt><dd>${esc(i.expected)}</dd><dt>Status</dt><dd>${esc(i.status)}</dd><dt>Evidence</dt><dd>${esc(i.evidence||"")}</dd></dl></article>`).join("")}$("load").onclick=()=>$("file").click();$("file").onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{data=JSON.parse(r.result);render()};r.readAsText(f)};fetch("./test-results.json").then(r=>r.json()).then(d=>{data=d;render()}).catch(()=>{});
</script></body></html>
