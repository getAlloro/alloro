name: Build Frontend + Backend and Deploy to Dev Targets

on:
  push:
    branches: [dev/dave]

# Serialize dev deploys so overlapping runs never race on TARGET_DIR.
concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd frontend
          echo "VITE_SENTRY_DSN=${{ vars.VITE_SENTRY_DSN }}" > .env
          npm ci
          npm run build
          cd ..

      - name: Move frontend build into backend
        run: |
          rm -rf public || true
          mkdir -p public
          cp -r frontend/dist/* public/

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Prepare deploy bundle
        run: |
          mkdir -p bundle
          cp -r dist bundle/
          cp -r public bundle/
          cp -r node_modules bundle/
          cp -r ecosystem.config.js bundle/
          cp package*.json bundle/
          cat > bundle/knexfile.js <<'EOF'
          require("dotenv").config();
          const fs = require("fs");
          const path = require("path");

          const migrationsDir = path.resolve(__dirname, "dist/database/migrations");
          const migrationSource = {
            getMigrations() {
              return fs
                .readdirSync(migrationsDir)
                .filter((file) => file.endsWith(".js"))
                .sort()
                .map((file) => ({
                  file,
                  name: file.replace(/\.js$/, ".ts"),
                }));
            },
            getMigrationName(migration) {
              return migration.name;
            },
            getMigration(migration) {
              return require(path.join(migrationsDir, migration.file));
            },
          };

          const connection = process.env.DATABASE_URL
            ? { connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } }
            : {
                host: process.env.DB_HOST,
                port: parseInt(process.env.DB_PORT || "5432", 10),
                user: process.env.DB_USER,
                password: process.env.DB_PASSWORD,
                database: process.env.DB_NAME,
                ssl: { rejectUnauthorized: false },
              };

          const base = {
            client: "pg",
            connection,
            migrations: {
              migrationSource,
            },
            pool: { min: 2, max: 50 },
          };

          module.exports = { production: base, development: base, test: base };
          EOF

      - name: Upload deploy bundle
        uses: actions/upload-artifact@v4
        with:
          name: alloro-dev-bundle
          path: bundle
          retention-days: 1

  deploy-dev:
    runs-on: ubuntu-latest
    needs: build
    env:
      TARGET_DIR: /var/www/signals
      SERVER_ENV_FILE: /etc/alloro/dev.env
      SERVER_GOOGLE_KEY_FILE: /etc/alloro/dev-google-key.json

    steps:
      - name: Download deploy bundle
        uses: actions/download-artifact@v4
        with:
          name: alloro-dev-bundle
          path: bundle

      - name: Verify server-managed config
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          port: ${{ secrets.DEV_EC2_PORT }}
          key: ${{ secrets.DEV_EC2_KEY }}
          script: |
            set -euo pipefail
            test -f "${{ env.SERVER_ENV_FILE }}"
            test -f "${{ env.SERVER_GOOGLE_KEY_FILE }}"

      - name: Clean remote target dir
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          port: ${{ secrets.DEV_EC2_PORT }}
          key: ${{ secrets.DEV_EC2_KEY }}
          script: |
            set -euo pipefail
            mkdir -p "${{ env.TARGET_DIR }}"
            TRASH="${{ env.TARGET_DIR }}/.trash-$$"
            mkdir -p "$TRASH"
            find "${{ env.TARGET_DIR }}" -mindepth 1 -maxdepth 1 ! -name '.trash-*' -exec mv -t "$TRASH" {} +
            rm -rf "${{ env.TARGET_DIR }}"/.trash-* 2>/dev/null || echo "WARN: some leftover files could not be removed; they will be swept on the next deploy"

      - name: Upload bundle to dev EC2
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          port: ${{ secrets.DEV_EC2_PORT }}
          key: ${{ secrets.DEV_EC2_KEY }}
          source: "bundle/**"
          target: ${{ env.TARGET_DIR }}
          strip_components: 1

      - name: Link server config and run migrations
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          port: ${{ secrets.DEV_EC2_PORT }}
          key: ${{ secrets.DEV_EC2_KEY }}
          script: |
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            nvm use node
            cd "${{ env.TARGET_DIR }}"
            ln -sfn "${{ env.SERVER_ENV_FILE }}" .env
            ln -sfn "${{ env.SERVER_GOOGLE_KEY_FILE }}" signals-google-key.json
            test -f .env
            test -f signals-google-key.json
            npm run db:migrate

      - name: Reload PM2
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          port: ${{ secrets.DEV_EC2_PORT }}
          key: ${{ secrets.DEV_EC2_KEY }}
          script: |
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            nvm use node
            cd "${{ env.TARGET_DIR }}"
            pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save

      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          port: ${{ secrets.DEV_EC2_PORT }}
          key: ${{ secrets.DEV_EC2_KEY }}
          script: |
            set -euo pipefail
            for attempt in $(seq 1 12); do
              if ! STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health/db); then
                STATUS="000"
              fi
              if [ "$STATUS" = "200" ]; then
                echo "Health check passed (HTTP $STATUS)"
                exit 0
              fi
              echo "Health check attempt $attempt failed (HTTP $STATUS)"
              sleep 5
            done
            echo "Health check failed after 12 attempts"
            exit 1

