name: Build and Deploy to Sandbox EC2

on:
  push:
    branches: [sandbox]

# Serialize deploys so overlapping runs never race on the target dir (the cause
# of intermittent "rm: ... Directory not empty" failures in the clean step).
concurrency:
  group: deploy-sandbox
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Create .env file
        run: |
          echo "${{ secrets.SANDBOX_ENV_FILE }}" > .env

      - name: Create signals-google-key.json file
        run: |
          echo '${{ secrets.SANDBOX_SIGNALS_GOOGLE_KEY }}' > signals-google-key.json

      - name: Install backend dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Build frontend
        run: |
          cd frontend
          echo "VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}" > .env
          npm ci
          npm run build
          cd ..

      - name: Move frontend build into backend
        run: |
          rm -rf public || true
          mkdir -p public
          cp -r frontend/dist/* public/

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Prepare deploy bundle
        run: |
          mkdir -p bundle
          cp -r dist bundle/
          cp -r node_modules bundle/
          cp -r public bundle/
          cp -r ecosystem.config.js bundle/
          cp package*.json bundle/
          cp .env bundle/
          cp signals-google-key.json bundle/
          # Generate a production knexfile that runs the COMPILED migrations from
          # dist/ (mirrors dev.yml). Only dist/ ships in the bundle (no src/, no TS
          # knexfile), so without this `npm run db:migrate` has nothing to run and
          # the sandbox deploys with a stale schema.
          cat > bundle/knexfile.js <<'EOF'
          require("dotenv").config();
          const fs = require("fs");
          const path = require("path");

          const migrationsDir = path.resolve(__dirname, "dist/database/migrations");
          const migrationSource = {
            getMigrations() {
              return fs
                .readdirSync(migrationsDir)
                .filter((file) => file.endsWith(".js"))
                .sort()
                .map((file) => ({
                  file,
                  // Match the sandbox DB's knex_migrations names, which are recorded
                  // with a .js extension (dev/prod use .ts). Sandbox-only convention.
                  name: file,
                }));
            },
            getMigrationName(migration) {
              return migration.name;
            },
            getMigration(migration) {
              return require(path.join(migrationsDir, migration.file));
            },
          };

          const connection = process.env.DATABASE_URL
            ? { connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } }
            : {
                host: process.env.DB_HOST,
                port: parseInt(process.env.DB_PORT || "5432", 10),
                user: process.env.DB_USER,
                password: process.env.DB_PASSWORD,
                database: process.env.DB_NAME,
                ssl: { rejectUnauthorized: false },
              };

          const base = {
            client: "pg",
            connection,
            migrations: {
              migrationSource,
              // The sandbox DB diverged from dev/dave (has orphan migrations from an
              // older lineage). Skip the "corrupt directory" check so knex runs only
              // the genuinely-pending migrations instead of refusing outright.
              disableMigrationsListValidation: true,
            },
            pool: { min: 2, max: 50 },
          };

          module.exports = { production: base, development: base, test: base };
          EOF

      - name: Clean remote target dir
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SANDBOX_EC2_HOST }}
          username: ${{ secrets.SANDBOX_EC2_USER }}
          port: ${{ secrets.SANDBOX_EC2_PORT }}
          key: ${{ secrets.SANDBOX_EC2_KEY }}
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.SANDBOX_TARGET_DIR }}"
            # Atomically move the previous release aside, then delete it best-effort.
            # A direct `rm -rf "$TARGET_DIR"/*` races with the live app / overlapping
            # deploys and intermittently dies with "Directory not empty"; renaming the
            # top-level entries is atomic and never blocks the deploy on deleting a
            # deep, possibly root-owned node_modules tree before the new release lands.
            TRASH="${{ secrets.SANDBOX_TARGET_DIR }}/.trash-$$"
            mkdir -p "$TRASH"
            find "${{ secrets.SANDBOX_TARGET_DIR }}" -mindepth 1 -maxdepth 1 ! -name '.trash-*' -exec mv -t "$TRASH" {} +
            rm -rf "${{ secrets.SANDBOX_TARGET_DIR }}"/.trash-* 2>/dev/null || echo "WARN: some leftover files could not be removed; they will be swept on the next deploy"

      - name: Upload bundle to EC2
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.SANDBOX_EC2_HOST }}
          username: ${{ secrets.SANDBOX_EC2_USER }}
          port: ${{ secrets.SANDBOX_EC2_PORT }}
          key: ${{ secrets.SANDBOX_EC2_KEY }}
          source: "bundle/**"
          target: ${{ secrets.SANDBOX_TARGET_DIR }}
          strip_components: 1

      - name: Reset database schema (one-time — sandbox DB diverged from dev/dave)
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SANDBOX_EC2_HOST }}
          username: ${{ secrets.SANDBOX_EC2_USER }}
          port: ${{ secrets.SANDBOX_EC2_PORT }}
          key: ${{ secrets.SANDBOX_EC2_KEY }}
          script: |
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use node
            cd "${{ secrets.SANDBOX_TARGET_DIR }}"
            test -f .env
            node -e '
              require("dotenv").config();
              const { Client } = require("pg");
              const conn = process.env.DATABASE_URL
                ? { connectionString: process.env.DATABASE_URL, ssl: { rejectUnauthorized: false } }
                : { host: process.env.DB_HOST, port: parseInt(process.env.DB_PORT || "5432", 10), user: process.env.DB_USER, password: process.env.DB_PASSWORD, database: process.env.DB_NAME, ssl: { rejectUnauthorized: false } };
              const c = new Client(conn);
              c.connect()
                .then(() => c.query("SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname = current_database() AND pid <> pg_backend_pid()"))
                .then(() => c.query("DROP SCHEMA public CASCADE; CREATE SCHEMA public;"))
                .then(() => { console.log("SANDBOX SCHEMA RESET OK"); return c.end(); })
                .catch((e) => { console.error("RESET FAILED:", e.message); process.exit(1); });
            '

      - name: Run database migrations
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SANDBOX_EC2_HOST }}
          username: ${{ secrets.SANDBOX_EC2_USER }}
          port: ${{ secrets.SANDBOX_EC2_PORT }}
          key: ${{ secrets.SANDBOX_EC2_KEY }}
          script: |
            set -euo pipefail
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            nvm use node
            cd "${{ secrets.SANDBOX_TARGET_DIR }}"
            test -f .env
            npm run db:migrate

      - name: Reload PM2
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SANDBOX_EC2_HOST }}
          username: ${{ secrets.SANDBOX_EC2_USER }}
          port: ${{ secrets.SANDBOX_EC2_PORT }}
          key: ${{ secrets.SANDBOX_EC2_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
            nvm use node
            cd ${{ secrets.SANDBOX_TARGET_DIR }}
            pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js
            pm2 save

      - name: Post-deploy health check
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.SANDBOX_EC2_HOST }}
          username: ${{ secrets.SANDBOX_EC2_USER }}
          port: ${{ secrets.SANDBOX_EC2_PORT }}
          key: ${{ secrets.SANDBOX_EC2_KEY }}
          script: |
            sleep 5
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health/db)
            if [ "$STATUS" != "200" ]; then
              echo "❌ Health check failed (HTTP $STATUS)"
              exit 1
            fi
            echo "✅ Health check passed (HTTP $STATUS)"
