name: PR Checks

# The repo's first pull_request workflow. Everything before this ran only on push-to-deploy, so a PR
# had no mechanical check of any kind -- the entire quality gate was one human reading a diff.
#
# RATCHET (deliberate): this starts with checks that are already ratcheted or have zero backlog, so
# it can be REQUIRED without flooding. Advisory steps below are marked and cannot fail the run; they
# get promoted to hard-fail once their backlog is cleared. A gate that cries wolf on day one gets
# ignored by week two -- that failure mode is why check:conventions' own Tier A is still advisory.
#
# WHAT THIS DOES NOT PROVE: it compiles both trees and runs both unit suites. It does not touch a
# database, a browser, or a provider API -- there are no secrets here and nothing deploys. Runtime
# behaviour (does the endpoint answer, does the screen render, is the number true) is NOT tested by
# this workflow, and a green run is not evidence of it. See §20.5 acceptance artifacts, advisory below.

on:
  pull_request:
    branches: [dev/dave, main]
    # `edited` is load-bearing, not tidiness. Without it GitHub defaults to
    # [opened, synchronize, reopened] -- so the first step below, which reads ONLY the PR body,
    # can never re-run after someone fixes the PR body. On 2026-07-22 that stranded three PRs
    # (#208, #209, #210) as red for six hours: their bodies were corrected at 20:55-21:04 and
    # the failing runs were from 15:12-20:17, with no event able to re-fire them. A gate that
    # stays red after the fix is worse than no gate -- it teaches the reviewer to ignore red.
    # Cost, stated plainly: a title/body edit now re-runs the whole job (install, tsc, both test
    # suites), not just the body check. Triggers are workflow-level, so the cheap alternative is
    # a separate legibility-only workflow -- deliberately NOT done here, because that would create
    # a second check name that branch protection does not require, quietly turning a hard gate soft.
    types: [opened, synchronize, reopened, edited]

# Read-only by default: no step here writes to the repo, posts a comment, or publishes anything.
# `pull_request` (not pull_request_target) runs fork PRs WITHOUT repo secrets, which is the correct
# trust boundary for a public repo -- untrusted code must never run with a privileged token.
permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # No step pushes or calls the API, so the checkout token has no reason to stay in
          # .git/config where every later step (and anything they run) could read it.
          persist-credentials: false

      # ---- HARD FAIL: PR body legibility (protocol Rule 3 / v1.1) ----
      # Reads the PR body from the event — no checkout data, no deps — so it fails in seconds,
      # before any install. Fails (naming the missing section) when a body is missing one of the
      # five PULL_REQUEST_TEMPLATE.md sections, or has a section header with no content under it.
      - name: PR body — five legibility sections present and non-empty
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          body="$(printf '%s' "${PR_BODY:-}" | tr -d '\r')"
          sections=(
            "## What this is"
            "## Where you see it"
            "## Who it touches"
            "## Planned action after merge"
            "## Acceptance"
          )
          missing=()
          for header in "${sections[@]}"; do
            if ! grep -qxF -- "$header" <<<"$body"; then
              missing+=("$header — header missing")
              continue
            fi
            content="$(awk -v h="$header" '
              $0==h {found=1; next}
              found && /^## / {exit}
              found {print}
            ' <<<"$body" | grep -v '^[[:space:]]*$' || true)"
            if [ -z "$content" ]; then
              missing+=("$header — present but empty (no content under the header)")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "PR body legibility FAILED — a PR the reviewer cannot situate is returned, not reviewed (protocol Rule 3). Fix these in the PR body (see .github/PULL_REQUEST_TEMPLATE.md):"
            for m in "${missing[@]}"; do echo "  - $m"; done
            exit 1
          fi
          echo "PR body legibility: all five sections present and non-empty."

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      # Both trees install: `npm ci` at the root does not touch frontend/, and a frontend-only PR
      # that never compiled the frontend used to pass this workflow clean.
      - name: Install dependencies (backend)
        run: npm ci

      - name: Install dependencies (frontend)
        run: npm --prefix frontend ci

      # ---- HARD FAIL: zero known backlog, so it gates from day one ----

      - name: Pointers resolve (repo artifacts in the manifest exist)
        run: bash scripts/check-pointers.sh

      - name: Backend — TypeScript compiles
        run: npx tsc --noEmit

      - name: Backend — tests
        run: npm test

      # Runs `tsc -b && vite build`, so this is the frontend's typecheck as well as its build.
      - name: Frontend — typecheck + build
        run: npm --prefix frontend run build

      - name: Frontend — tests
        run: npm --prefix frontend test

      # check:conventions --strict fails only on NEW backend size/console/db violations (§18 -- it is
      # ratcheted against a frozen baseline), so it gates without demanding the backlog be cleared.
      # NOTE the `--`: `npm run check:conventions --strict` silently drops the flag (npm consumes it
      # and the script parses $@), which is how this "gate" ran as a no-op for its whole life.
      - name: Constitution — mechanized checks (backend, strict)
        run: npm run check:conventions -- --strict

      # ---- ADVISORY: real backlog. Reports, never fails. Promote when the backlog is cleared. ----

      - name: 'ADVISORY — §20.5 acceptance artifacts for touched plans'
        continue-on-error: true
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          plans=$(git diff --name-only "$base" "$head" -- 'plans/*' \
                  | cut -d/ -f1-2 | sort -u)
          [ -z "$plans" ] && { echo "No plan folders touched."; exit 0; }
          missing=0
          while IFS= read -r p; do
            [ -z "$p" ] && continue
            for artifact in test.html test-results.json; do
              if [ ! -f "$p/$artifact" ]; then
                echo "::warning file=$p::§20.5 — $p/$artifact missing (acceptance artifact)"
                missing=$((missing + 1))
              fi
            done
          done <<< "$plans"
          if [ "$missing" -gt 0 ]; then
            echo "$missing §20.5 artifact(s) missing. Advisory today — this is the single most"
            echo "frequent review finding, so it is the first candidate for promotion to hard-fail."
          else
            echo "OK — every touched plan ships its §20.5 artifacts."
          fi

      - name: 'ADVISORY — lint + layering baselines'
        continue-on-error: true
        run: |
          npm run lint || true
          npm --prefix frontend run lint || true
          npm run depcruise || true
