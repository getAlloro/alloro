services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${ALLORO_POSTGRES_DB:?ALLORO_POSTGRES_DB is required}
      POSTGRES_USER: ${ALLORO_POSTGRES_USER:?ALLORO_POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${ALLORO_POSTGRES_PASSWORD:?ALLORO_POSTGRES_PASSWORD is required}
    volumes:
      - ${ALLORO_SCHEMA_BASELINE_PATH:?ALLORO_SCHEMA_BASELINE_PATH is required}:/docker-entrypoint-initdb.d/001-schema.sql:ro
      - ${ALLORO_MIGRATION_BOOTSTRAP_PATH:?ALLORO_MIGRATION_BOOTSTRAP_PATH is required}:/docker-entrypoint-initdb.d/002-migrations.sql:ro
    ports:
      - "127.0.0.1::5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 1s
      timeout: 3s
      retries: 60
    restart: "no"

  redis:
    image: redis:7-alpine
    command:
      - redis-server
      - --save
      - ""
      - --appendonly
      - "no"
    ports:
      - "127.0.0.1::6379"
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 1s
      timeout: 3s
      retries: 60
    restart: "no"
